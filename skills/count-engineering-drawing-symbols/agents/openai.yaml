  short_description: "Review supported drawing quantities with traceable evidence"
  default_prompt: "Use $count-engineering-drawing-symbols to prepare and review a Power, Lighting, Fire Alarm, Data/Voice, or CCTV/Security symbol audit with compact MCP responses. Prefer confirmed vector-layer mappings on clean vector sheets, create markup, and ask me about every uncertain point before finalizing."
